<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>贪吃蛇 v2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #eee;
    }
    h1 { margin-bottom: 6px; font-size: 26px; letter-spacing: 3px; color: #4ecca3; }
    .version { font-size: 12px; color: #555; margin-bottom: 10px; letter-spacing: 1px; }
    #info {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    #info span { color: #4ecca3; font-weight: bold; }
    #speed-bar-wrap {
      width: 400px;
      margin-bottom: 8px;
    }
    #speed-label { font-size: 12px; color: #888; margin-bottom: 3px; }
    #speed-bar-bg {
      width: 100%;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    #speed-bar {
      height: 100%;
      background: linear-gradient(90deg, #4ecca3, #f5a623);
      width: 10%;
      transition: width 0.4s;
      border-radius: 3px;
    }
    canvas {
      border: 2px solid #4ecca3;
      background: #16213e;
      display: block;
    }
    #message {
      margin-top: 12px;
      font-size: 15px;
      color: #f5a623;
      min-height: 22px;
    }
    #controls {
      margin-top: 6px;
      font-size: 12px;
      color: #555;
    }
    .btn-row { margin-top: 10px; display: flex; gap: 10px; }
    button {
      padding: 8px 22px;
      background: #4ecca3;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
    }
    button:hover { background: #38b89a; }
    #pauseBtn { background: #e2a013; color: #1a1a2e; display: none; }
    #pauseBtn:hover { background: #c88c0e; }

    /* 最高分 */
    #best { color: #aaa; }
    #best span { color: #f5a623; }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>
  <div class="version">v2.0 — 速度随分数提升 · 暂停功能</div>
  <div id="info">
    <div>得分：<span id="scoreVal">0</span></div>
    <div id="best">最高分：<span id="bestVal">0</span></div>
    <div>速度：<span id="speedVal">1</span></div>
  </div>
  <div id="speed-bar-wrap">
    <div id="speed-label">速度进度</div>
    <div id="speed-bar-bg"><div id="speed-bar"></div></div>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="message">用方向键控制，空格键暂停</div>
  <div id="controls">↑ ↓ ← → 移动 &nbsp;|&nbsp; 空格 暂停/继续</div>
  <div class="btn-row">
    <button id="pauseBtn" onclick="togglePause()">暂停</button>
    <button id="restartBtn" onclick="init()" style="display:none">重新开始</button>
  </div>

  <script>
    const COLS = 20, ROWS = 20, CELL = 20;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const scoreEl   = document.getElementById('scoreVal');
    const bestEl    = document.getElementById('bestVal');
    const speedEl   = document.getElementById('speedVal');
    const speedBar  = document.getElementById('speed-bar');
    const msgEl     = document.getElementById('message');
    const pauseBtn  = document.getElementById('pauseBtn');
    const restartBtn= document.getElementById('restartBtn');

    let snake, dir, nextDir, food, score, bestScore, timer, running, paused;
    bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = bestScore;

    // 速度档：每得 5 分提速一档，共 10 档
    const SPEEDS = [150, 135, 120, 108, 95, 82, 70, 60, 50, 42];

    function getSpeed(s) {
      const level = Math.min(Math.floor(s / 5), SPEEDS.length - 1);
      return SPEEDS[level];
    }

    function randomCell() {
      return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    }

    function placeFood() {
      let pos;
      do { pos = randomCell(); }
      while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function init() {
      clearInterval(timer);
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      score = 0;
      running = true;
      paused = false;
      scoreEl.textContent = '0';
      speedEl.textContent = '1';
      speedBar.style.width = '10%';
      msgEl.textContent = '用方向键控制，空格键暂停';
      pauseBtn.style.display = 'inline-block';
      pauseBtn.textContent = '暂停';
      restartBtn.style.display = 'none';
      placeFood();
      timer = setInterval(step, getSpeed(score));
      draw();
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS)
        return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y))
        return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        // 更新速度
        const level = Math.min(Math.floor(score / 5), SPEEDS.length - 1);
        speedEl.textContent = level + 1;
        speedBar.style.width = ((level + 1) / SPEEDS.length * 100) + '%';
        // 重设定时器到新速度
        clearInterval(timer);
        timer = setInterval(step, getSpeed(score));
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      clearInterval(timer);
      running = false;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('snakeBest', bestScore);
        bestEl.textContent = bestScore;
        msgEl.textContent = '🎉 新纪录！得分：' + score;
      } else {
        msgEl.textContent = '游戏结束！得分：' + score;
      }
      pauseBtn.style.display = 'none';
      restartBtn.style.display = 'inline-block';
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        clearInterval(timer);
        pauseBtn.textContent = '继续';
        msgEl.textContent = '⏸ 已暂停';
      } else {
        timer = setInterval(step, getSpeed(score));
        pauseBtn.textContent = '暂停';
        msgEl.textContent = '用方向键控制，空格键暂停';
      }
    }

    function draw() {
      // 背景
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 网格线
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL, 0);
        ctx.lineTo(i * CELL, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * CELL);
        ctx.lineTo(canvas.width, j * CELL);
        ctx.stroke();
      }

      // 食物（圆形）
      ctx.fillStyle = '#f5a623';
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // 蛇（圆角矩形）
      snake.forEach((s, i) => {
        const x = s.x * CELL + 1;
        const y = s.y * CELL + 1;
        const w = CELL - 2;
        ctx.fillStyle = i === 0 ? '#4ecca3' : `hsl(${160 - i * 3}, 65%, 45%)`;
        roundRect(ctx, x, y, w, w, 4);
        ctx.fill();
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); togglePause(); return; }
      if (!running || paused) return;
      const keys = {
        ArrowUp:    {x:0,  y:-1},
        ArrowDown:  {x:0,  y:1},
        ArrowLeft:  {x:-1, y:0},
        ArrowRight: {x:1,  y:0}
      };
      const d = keys[e.key];
      if (!d) return;
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      e.preventDefault();
    });

    init();
  </script>
</body>
</html>
